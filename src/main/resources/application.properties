# ── Datasource ────────────────────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql

%dev.quarkus.datasource.username=${DB_USER:helpdesk}
%dev.quarkus.datasource.password=${DB_PASSWORD:helpdesk}
%dev.quarkus.datasource.devservices.image-name=postgres:18

%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=require
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASSWORD}

# ── Hibernate ─────────────────────────────────────────────────────────────────
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.hibernate-orm.sql-load-script=import.sql

%prod.quarkus.hibernate-orm.database.generation=none
%prod.quarkus.hibernate-orm.sql-load-script=no-file

# ── JWT ───────────────────────────────────────────────────────────────────────
# Dev: keys loaded from classpath (src/main/resources/*.pem)
# Prod: keys loaded from bind-mounted files (see docker-compose.yml)
mp.jwt.verify.issuer=https://helpdesk.si
mp.jwt.verify.publickey.location=publicKey.pem
%prod.mp.jwt.verify.publickey.location=file:/app/publicKey.pem
%prod.jwt.private.key.location=/app/privateKey.pem

# ── OpenAPI ───────────────────────────────────────────────────────────────────
quarkus.smallrye-openapi.info-title=HelpDesk API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=REST API for the HelpDesk mobile + operator web app
quarkus.swagger-ui.always-include=true

# ── CORS ──────────────────────────────────────────────────────────────────────
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*
